<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Jagjeet — Welcome! 🌟</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a1a;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      touch-action: none;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    canvas { display: block; }

    #ui {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 1rem;
    }

    #top-bar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    #name-tag {
      font-size: clamp(2rem, 8vw, 4.5rem);
      font-weight: 800;
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, #f9d3ff, #b9a6ff, #8fd8ff, #f9d3ff);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
      filter: drop-shadow(0 0 20px rgba(185,166,255,0.5));
      text-shadow: none;
    }

    @keyframes shimmer {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    #tagline {
      font-size: clamp(0.75rem, 2.5vw, 1rem);
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    #score-area {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .score-pill {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      padding: 0.4rem 1rem;
      color: white;
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      backdrop-filter: blur(10px);
    }

    .score-num {
      font-weight: 700;
      color: #f9d3ff;
    }

    #bottom-ui {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 480px;
    }

    #hint {
      color: rgba(255,255,255,0.35);
      font-size: clamp(0.65rem, 2vw, 0.8rem);
      text-align: center;
      letter-spacing: 0.05em;
    }

    #feed-btn {
      pointer-events: all;
      background: linear-gradient(135deg, #c084fc, #818cf8);
      border: none;
      border-radius: 999px;
      padding: 0.75rem 2rem;
      color: white;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(192,132,252,0.4);
    }

    #feed-btn:hover { transform: scale(1.05); box-shadow: 0 6px 30px rgba(192,132,252,0.6); }
    #feed-btn:active { transform: scale(0.97); }

    #emoji-rain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
      overflow: hidden;
    }

    .falling-emoji {
      position: absolute;
      font-size: 1.8rem;
      animation: fall linear forwards;
      top: -60px;
    }

    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .pop-text {
      position: fixed;
      pointer-events: none;
      font-size: 1.1rem;
      font-weight: 700;
      color: #f9d3ff;
      z-index: 30;
      animation: popUp 1.2s ease-out forwards;
    }

    @keyframes popUp {
      0%   { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-80px) scale(1.3); opacity: 0; }
    }

    #mood-bar {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }

    #mood-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #818cf8, #c084fc, #f472b6);
      width: 60%;
      transition: width 0.4s ease;
    }

    #mood-label {
      color: rgba(255,255,255,0.4);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      display: flex;
      justify-content: space-between;
      width: 100%;
    }

    #star-count-display {
      position: fixed;
      top: 1rem;
      right: 1.2rem;
      z-index: 15;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.25rem;
    }

    #planet-glow {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 55%, rgba(185,166,255,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    @media (max-width: 480px) {
      #ui { padding: 1.2rem 0.75rem; }
      #feed-btn { padding: 0.65rem 1.5rem; }
    }
  </style>
</head>
<body>

<div id="emoji-rain"></div>
<div id="planet-glow"></div>

<div id="canvas-container">
  <canvas id="c"></canvas>
</div>

<div id="ui">
  <div id="top-bar">
    <div id="name-tag">JAGJEET</div>
    <div id="tagline">✨ Coming Soon — Something Wonderful ✨</div>
  </div>

  <div id="bottom-ui">
    <div id="mood-label">
      <span>💤 Sleepy</span>
      <span>Happiness</span>
      <span>Ecstatic 🥳</span>
    </div>
    <div id="mood-bar"><div id="mood-fill"></div></div>
    <button id="feed-btn">🌟 Give a Star!</button>
    <div id="hint">Spin the planet · Tap to give stars · Watch it grow!</div>
  </div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 6);

let mood = 60;
let stars = 0;
let isHappy = false;
let happyTimer = 0;

const EMOJIS = ['⭐','🌟','✨','💫','🌙','🪐','🎉','💜','🌈','🌸'];
const MESSAGES = ['Awww! 🥺','So cute!','Love it! 💖','Yayyyy! 🎉','Best!','Sparkle! ✨','Adorable!','Wow! 🌟'];

const updateMood = () => {
  document.getElementById('mood-fill').style.width = Math.min(100, mood) + '%';
};

const spawnEmoji = (x, y) => {
  const rain = document.getElementById('emoji-rain');
  const el = document.createElement('div');
  el.className = 'falling-emoji';
  el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
  el.style.left = (x ?? Math.random() * 90 + 5) + '%';
  el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
  rain.appendChild(el);
  setTimeout(() => el.remove(), 4000);
};

const spawnPopText = (x, y) => {
  const el = document.createElement('div');
  el.className = 'pop-text';
  el.textContent = MESSAGES[Math.floor(Math.random() * MESSAGES.length)];
  el.style.left = (x - 40) + 'px';
  el.style.top = (y - 20) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1300);
};

document.getElementById('feed-btn').addEventListener('click', (e) => {
  stars++;
  mood = Math.min(100, mood + 8);
  updateMood();
  isHappy = true;
  happyTimer = 120;
  for (let i = 0; i < 5; i++) setTimeout(() => spawnEmoji(), i * 100);
  spawnPopText(e.clientX, e.clientY);
});

const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xfff8ee, 2.5);
sunLight.position.set(5, 4, 5);
sunLight.castShadow = true;
scene.add(sunLight);

const fillLight = new THREE.PointLight(0xb9a6ff, 1.5, 20);
fillLight.position.set(-4, -2, 3);
scene.add(fillLight);

const rimLight = new THREE.PointLight(0x8fd8ff, 1.0, 20);
rimLight.position.set(0, 5, -5);
scene.add(rimLight);

const geo = new THREE.SphereGeometry(1.5, 64, 64);

const canvas2d = document.createElement('canvas');
canvas2d.width = 1024; canvas2d.height = 512;
const ctx = canvas2d.getContext('2d');

const drawPlanetTexture = (happy) => {
  ctx.clearRect(0, 0, 1024, 512);

  const grad = ctx.createLinearGradient(0, 0, 0, 512);
  if (happy) {
    grad.addColorStop(0, '#1a0533');
    grad.addColorStop(0.5, '#2d1b6e');
    grad.addColorStop(1, '#0d2052');
  } else {
    grad.addColorStop(0, '#0d0520');
    grad.addColorStop(0.5, '#1a0f3d');
    grad.addColorStop(1, '#071230');
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 1024, 512);

  for (let i = 0; i < 120; i++) {
    const x = Math.random() * 1024;
    const y = Math.random() * 512;
    const r = Math.random() * 1.5 + 0.3;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.8 + 0.2})`;
    ctx.fill();
  }

  const colors = happy
    ? ['rgba(249,211,255,0.18)','rgba(143,216,255,0.14)','rgba(185,166,255,0.16)']
    : ['rgba(185,166,255,0.10)','rgba(143,216,255,0.08)','rgba(249,211,255,0.06)'];

  for (let i = 0; i < 6; i++) {
    const y = 80 + i * 60;
    const grad2 = ctx.createLinearGradient(0, y - 25, 0, y + 25);
    grad2.addColorStop(0, 'transparent');
    grad2.addColorStop(0.5, colors[i % colors.length]);
    grad2.addColorStop(1, 'transparent');
    ctx.fillStyle = grad2;
    ctx.beginPath();
    ctx.ellipse(512, y, 400 + Math.random() * 100, 20 + Math.random() * 10, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.font = 'bold 56px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = happy ? 'rgba(255,240,255,0.92)' : 'rgba(200,180,255,0.75)';
  ctx.shadowColor = happy ? '#f9d3ff' : '#b9a6ff';
  ctx.shadowBlur = happy ? 30 : 15;
  ctx.fillText('JAGJEET', 512, 256);

  const face = happy ? '( ˘ ³˘)♥' : '( ˘ω˘ )';
  ctx.font = 'bold 38px Arial';
  ctx.fillStyle = happy ? 'rgba(255,230,255,0.9)' : 'rgba(220,200,255,0.7)';
  ctx.shadowBlur = 10;
  ctx.fillText(face, 512, 320);
};

drawPlanetTexture(false);
const planetTex = new THREE.CanvasTexture(canvas2d);

const mat = new THREE.MeshStandardMaterial({
  map: planetTex,
  roughness: 0.4,
  metalness: 0.2,
  emissiveMap: planetTex,
  emissive: new THREE.Color(0x2a1060),
  emissiveIntensity: 0.25,
});

const planet = new THREE.Mesh(geo, mat);
planet.castShadow = true;
scene.add(planet);

const ringGeo = new THREE.RingGeometry(2.1, 3.2, 80);
const ringMat = new THREE.MeshBasicMaterial({
  color: 0xb9a6ff,
  side: THREE.DoubleSide,
  transparent: true,
  opacity: 0.18,
});
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = Math.PI * 0.42;
scene.add(ring);

const ring2Geo = new THREE.RingGeometry(2.3, 2.8, 80);
const ring2Mat = new THREE.MeshBasicMaterial({
  color: 0x8fd8ff,
  side: THREE.DoubleSide,
  transparent: true,
  opacity: 0.10,
});
const ring2 = new THREE.Mesh(ring2Geo, ring2Mat);
ring2.rotation.x = Math.PI * 0.42;
ring2.rotation.z = 0.3;
scene.add(ring2);

const starsGeo = new THREE.BufferGeometry();
const starCount = 800;
const positions = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  positions[i * 3] = (Math.random() - 0.5) * 60;
  positions[i * 3 + 1] = (Math.random() - 0.5) * 60;
  positions[i * 3 + 2] = (Math.random() - 0.5) * 60;
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, sizeAttenuation: true });
const starField = new THREE.Points(starsGeo, starsMat);
scene.add(starField);

const moonGeo = new THREE.SphereGeometry(0.28, 32, 32);
const moonMat = new THREE.MeshStandardMaterial({ color: 0xfff3e0, roughness: 0.7, metalness: 0.05 });
const moon = new THREE.Mesh(moonGeo, moonMat);
scene.add(moon);

const heartParticles = [];
const addHeart = () => {
  const hGeo = new THREE.SphereGeometry(0.06, 8, 8);
  const hMat = new THREE.MeshBasicMaterial({ color: 0xf472b6, transparent: true, opacity: 0.9 });
  const h = new THREE.Mesh(hGeo, hMat);
  const angle = Math.random() * Math.PI * 2;
  const radius = 1.6 + Math.random() * 0.4;
  h.position.set(Math.cos(angle) * radius, (Math.random() - 0.5) * 2, Math.sin(angle) * radius);
  h.userData = { life: 1.0, vy: 0.015 + Math.random() * 0.01, angle, radius };
  scene.add(h);
  heartParticles.push(h);
};

let autoRotX = 0, autoRotY = 0;
let isDragging = false;
let prevX = 0, prevY = 0;
let velX = 0, velY = 0;
let targetRotX = 0, targetRotY = 0;

const onPointerDown = (e) => {
  isDragging = true;
  prevX = e.touches ? e.touches[0].clientX : e.clientX;
  prevY = e.touches ? e.touches[0].clientY : e.clientY;
  velX = 0; velY = 0;
};

const onPointerMove = (e) => {
  if (!isDragging) return;
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  const dx = cx - prevX;
  const dy = cy - prevY;
  velX = dy * 0.006;
  velY = dx * 0.006;
  targetRotX += velX;
  targetRotY += velY;
  prevX = cx; prevY = cy;
};

const onPointerUp = () => { isDragging = false; };

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mousemove', onPointerMove);
canvas.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('touchstart', onPointerDown, { passive: true });
canvas.addEventListener('touchmove', onPointerMove, { passive: true });
canvas.addEventListener('touchend', onPointerUp);

canvas.addEventListener('click', (e) => {
  mood = Math.min(100, mood + 3);
  updateMood();
  spawnPopText(e.clientX, e.clientY);
  if (Math.random() < 0.4) spawnEmoji(
    (e.clientX / window.innerWidth) * 100,
    e.clientY
  );
  isHappy = true;
  happyTimer = 60;
});

let frame = 0;
const clock = new THREE.Clock();

const animate = () => {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  frame++;

  if (!isDragging) {
    velX *= 0.92;
    velY *= 0.92;
    targetRotX += velX;
    targetRotY += velY;
    targetRotY += 0.003;
  }

  planet.rotation.x += (targetRotX - planet.rotation.x) * 0.08;
  planet.rotation.y += (targetRotY - planet.rotation.y) * 0.08;

  ring.rotation.y = t * 0.3;
  ring2.rotation.y = -t * 0.2;

  moon.position.x = Math.cos(t * 0.6) * 2.6;
  moon.position.y = Math.sin(t * 0.4) * 0.4;
  moon.position.z = Math.sin(t * 0.6) * 2.6;

  starField.rotation.y = t * 0.01;

  fillLight.position.x = Math.cos(t * 0.5) * 6;
  fillLight.position.z = Math.sin(t * 0.5) * 6;

  if (happyTimer > 0) {
    happyTimer--;
    if (happyTimer === 115 || happyTimer === 60 || happyTimer === 30) {
      drawPlanetTexture(true);
      planetTex.needsUpdate = true;
      mat.emissive.setHex(0x4a20a0);
      mat.emissiveIntensity = 0.5;
      if (happyTimer === 115) for (let i = 0; i < 6; i++) addHeart();
    }
  } else if (isHappy) {
    isHappy = false;
    drawPlanetTexture(false);
    planetTex.needsUpdate = true;
    mat.emissive.setHex(0x2a1060);
    mat.emissiveIntensity = 0.25;
  }

  for (let i = heartParticles.length - 1; i >= 0; i--) {
    const h = heartParticles[i];
    h.userData.life -= 0.012;
    h.position.y += h.userData.vy;
    h.scale.setScalar(h.userData.life);
    h.material.opacity = h.userData.life;
    if (h.userData.life <= 0) {
      scene.remove(h);
      heartParticles.splice(i, 1);
    }
  }

  mood = Math.max(20, mood - 0.01);
  if (frame % 60 === 0) updateMood();

  renderer.render(scene, camera);
};

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

window.addEventListener('touchstart', (e) => {
  const btn = document.getElementById('feed-btn');
  if (!btn.contains(e.target)) e.preventDefault();
}, { passive: false });

updateMood();
animate();

setTimeout(() => {
  for (let i = 0; i < 3; i++) setTimeout(() => spawnEmoji(), i * 300);
}, 1000);
</script>
</body>
</html>
